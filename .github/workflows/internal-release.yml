name: "Internal testing android release"

on:
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: 3.29.2
          cache: true

      - name: Setup keys
        uses: timheuer/base64-to-file@v1
        with:
          fileName: "keystore/upload_key.jks"
          encodedString: ${{ secrets.SIGNING_KEY_BASE64 }}

      - name: Setup env
        run: |
          echo "VIDEO_SERVICE_URL=${{ secrets.VIDEO_SERVICE_URL }}" >> .env
          echo "SPRK_APPVIEW_URL=${{ secrets.SPRK_APPVIEW_URL }}" >> .env

      - name: Build PlayStore AAB
        run: |
          flutter build appbundle --release
        env:
          SIGNING_KEY_PATH: "/home/runner/work/_temp/keystore/upload_key.jks"
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload AAB to PlayStore
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: so.sprk.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: qa
