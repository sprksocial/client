name: "Internal testing android release"

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: 3.29.2
          cache: true

      - name: Setup keys
        uses: timheuer/base64-to-file@v1
        with:
          fileName: "keystore/upload_key.jks"
          encodedString: ${{ secrets.SIGNING_KEY_BASE64 }}

      - name: Setup env
        run: |
          echo "VIDEO_SERVICE_URL=${{ secrets.VIDEO_SERVICE_URL }}" >> .env
          echo "SPRK_APPVIEW_URL=${{ secrets.SPRK_APPVIEW_URL }}" >> .env

      - name: Configure Keystore
        run: |
          echo "storeFile=/home/runner/work/_temp/keystore/upload_key.jks" >> key.properties
          echo "storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> key.properties
          echo "keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> key.properties
        working-directory: android

      - name: Build PlayStore AAB
        run: |
          flutter build appbundle

      - name: Upload AAB to PlayStore
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: so.sprk.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
