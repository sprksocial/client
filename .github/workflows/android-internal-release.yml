name: "Internal testing android release"

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: "read"
  id-token: "write"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          cache: "gradle"
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: 3.38.4
          cache: true

      - name: Generated code setup
        run: |
          flutter pub get --enforce-lockfile
          dart run build_runner build --delete-conflicting-outputs

      - name: Setup keys
        uses: timheuer/base64-to-file@v1
        with:
          fileName: "keystore/upload_key.jks"
          encodedString: ${{ secrets.SIGNING_KEY_BASE64 }}

      - name: Setup env
        run: |
          echo "VIDEO_SERVICE_URL=https://video.sprk.so" >> .env
          echo "SPRK_APPVIEW_URL=https://api.sprk.so" >> .env
          echo "MESSAGES_SERVICE_URL=https://chat.sprk.so" >> .env
          echo "SHOWCASES_LICENSE_FLUTTER=${{ secrets.SHOWCASES_LICENSE_FLUTTER }}" >> .env
          echo "SIGNUPS_DISABLED=false" >> .env

      - name: Set versionCode (commit count + run attempt)
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_ATTEMPT=${{ github.run_attempt }}
          VERSION_CODE=$((COMMIT_COUNT * 10 + BUILD_ATTEMPT))
          sed -i "s/^\(version:.*\)+[0-9]*\$/\1+${VERSION_CODE}/" pubspec.yaml
          echo "Using versionCode: $VERSION_CODE"

      - name: Configure Keystore
        run: |
          echo "storeFile=/home/runner/work/_temp/keystore/upload_key.jks" >> key.properties
          echo "storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> key.properties
          echo "keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> key.properties
        working-directory: android

      - name: Configure Gradle for CI
        run: |
          # Override memory settings for CI (GitHub Actions has ~7GB RAM)
          # Use sed to replace existing values or append if they don't exist
          if grep -q "^org.gradle.jvmargs=" gradle.properties; then
            sed -i 's|^org.gradle.jvmargs=.*|org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError|' gradle.properties
          else
            echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError" >> gradle.properties
          fi
          # Disable daemon and parallel builds for CI stability
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.configureondemand=false" >> gradle.properties
        working-directory: android

      - name: Clean previous builds
        run: |
          flutter clean
          cd android && ./gradlew clean || true

      - name: Build PlayStore AAB
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        timeout-minutes: 30
        run: |
          flutter build appbundle --verbose

      - name: Upload AAB to PlayStore
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: so.sprk.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal