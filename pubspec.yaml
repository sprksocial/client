name: spark
description: "Spark mobile app"
publish_to: "none"
# The number after + should stay fixed, the android workflow will change it on every build
version: 0.11.3+1
environment:
  sdk: ^3.11.0
workspace:
  - widgetbook
  - fonts
  - assets

dependencies:
  any_link_preview: ^3.0.3
  app_badge_plus: ^1.2.10
  assets:
    path: assets
  audio_waveforms: ^2.0.2
  audioplayers: ^6.6.0
  auto_route: ^11.1.0
  better_player_plus: ^1.2.1
  bluesky_poptart: ^0.1.1
  ozone_poptart: ^0.1.1
  plyr_poptart: ^0.1.0
  poptart: ^0.1.0
  poptart_lex: ^0.1.0
  sprk_poptart: ^0.1.1
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  collection: ^1.19.1
  crypto: ^3.0.7
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  fluentui_system_icons: ^1.1.273
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_colorpicker: ^1.1.0
  flutter_dotenv: ^6.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  flutter_svg: ^2.3.0
  flutter_web_auth_2: ^5.0.2
  fonts:
    path: fonts
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  fvp: ^0.36.2
  get_it: ^9.2.1
  google_fonts: ^8.1.0
  http: ^1.6.0
  image: ^4.8.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  json_annotation: ^4.11.0
  path: ^1.9.1
  path_provider: ^2.1.5
  photo_manager: ^3.9.0
  oauth2: ^2.0.5
  pool: ^1.5.2
  posthog_flutter: ^5.24.2
  pro_image_editor: ^12.4.4
  pro_video_editor: ^1.16.3
  riverpod_annotation: ^4.0.2
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  skeletonizer: ^2.1.3
  sqflite: ^2.4.2+1
  synchronized: ^3.4.0+1
  url_launcher: ^6.3.2
  video_player: ^2.11.1

dev_dependencies:
  auto_route_generator: ^10.4.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#000000"
  background_image: assets/branding/splash.png
  color_dark: "#000000"
  android_12:
    color: "#000000"
    background_image: assets/branding/splash.png
    color_dark: "#000000"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/sprk.svg
  fonts:
    - family: Fraunces
      fonts:
        - asset: packages/fonts/Fraunces-Variable.ttf
    - family: SN Pro
      fonts:
        - asset: packages/fonts/SNPro-Variable.ttf
