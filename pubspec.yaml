name: sparksocial
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  ionicons: ^0.2.2
  cupertino_icons: ^1.0.6
  video_player: ^2.9.3
  cached_network_image: ^3.3.1
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  provider: ^6.1.1
  flutter_launcher_icons: ^0.14.3
  flutter_svg: ^2.0.7
  atproto: ^0.13.3
  bluesky: ^0.18.10
  http: ^1.1.0
  shared_preferences: ^2.5.3
  visibility_detector: ^0.4.0+2
  fvp: ^0.30.0
  lucide_icons_flutter: ^2.0.0
  fluentui_system_icons: ^1.1.273
  image_picker: ^1.0.7
  video_editor_sdk: ^3.2.0
  path: ^1.9.1
  preload_page_view: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/
    - assets/licenses/
    - .env
