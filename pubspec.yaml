name: sparksocial
description: "A new Flutter project."
publish_to: 'none'
# The number after + should stay fixed, the android workflow will change it on every build
version: 0.2.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  ionicons: ^0.2.2
  cupertino_icons: ^1.0.6
  video_player: ^2.9.3
  cached_network_image: ^3.3.1
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  flutter_launcher_icons: ^0.14.3
  flutter_svg: ^2.0.7
  atproto: ^0.13.3
  bluesky: ^0.18.10
  http: ^1.2.0
  url_launcher: ^6.2.5
  dio: ^5.4.0
  shared_preferences: ^2.5.3
  visibility_detector: ^0.4.0+2
  fvp: ^0.30.0
  lucide_icons_flutter: ^2.0.0
  fluentui_system_icons: ^1.1.273
  image_picker: ^1.0.7
  video_editor_sdk: ^3.2.0
  path: ^1.9.1
  preload_page_view: ^0.2.0
  mime: ^1.0.6
  image: ^4.5.4
  flutter_cache_manager: ^3.3.1
  # New architecture dependencies
  synchronized: ^3.1.0
  logger: ^2.0.2
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  get_it: ^7.6.7
  auto_route: ^7.8.4
  flutter_native_splash: ^2.4.6
  flutter_secure_storage: ^4.2.1
  # Old architecture dependencies
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # New architecture dev dependencies
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  auto_route_generator: ^7.3.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/
    - .env
