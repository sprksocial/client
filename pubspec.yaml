name: spark
description: "Spark mobile app"
publish_to: "none"
# The number after + should stay fixed, the android workflow will change it on every build
version: 0.5.0+1
environment:
  sdk: ^3.10.0
workspace:
  - widgetbook
  - fonts
  - assets

dependencies:
  any_link_preview: ^3.0.3
  assets:
    path: assets
  atproto: ^1.3.0
  atproto_core: ^1.1.0
  audio_waveforms: ^2.0.0
  audioplayers: ^6.5.1
  auto_route: ^10.1.0+1
  better_player_plus: ^1.1.5
  bluesky: ^1.3.0
  cached_network_image: ^3.3.1
  camera: ^0.11.1
  carousel_slider: ^5.0.0
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  fluentui_system_icons: ^1.1.273
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.3.1
  flutter_colorpicker: ^1.1.0
  flutter_dotenv: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.0
  fonts:
    path: fonts
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  fvp: ^0.35.2
  get_it: ^9.2.0
  google_fonts: ^7.0.0
  gradient_borders: ^1.0.1
  http: ^1.2.0
  image: ^4.7.2
  image_picker: ^1.0.7
  intl: ^0.20.2
  json_annotation: ^4.9.0
  path: ^1.9.1
  path_provider: ^2.1.2
  pool: ^1.5.0
  posthog_flutter: ^5.11.0
  pro_image_editor: ^12.0.0-beta.5
  pro_video_editor:
    git:
      url: https://github.com/sprksocial/pro_video_editor.git
      ref: dev
  riverpod_annotation: ^3.0.3
  shared_preferences: ^2.5.3
  skeletonizer: ^2.1.2
  sqflite: ^2.4.2
  synchronized: ^3.1.0
  url_launcher: ^6.2.5
  video_player: ^2.10.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  auto_route_generator: ^10.2.3
  build_runner: ^2.10.4
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.1
  riverpod_generator: ^3.0.3
  very_good_analysis: ^10.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#000000"
  background_image: assets/branding/splash.png
  color_dark: "#000000"
  android_12:
    color: "#000000"
    background_image: assets/branding/splash.png
    color_dark: "#000000"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/sprk.svg
  fonts:
    - family: Fraunces
      fonts:
        - asset: packages/fonts/Fraunces-Variable.ttf
    - family: SN Pro
      fonts:
        - asset: packages/fonts/SNPro-Variable.ttf
